<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Music Player Widget</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Fonts + Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="musicplayer.css" />
</head>
<body>
  <div class="music-widget">
    <!-- Album Art -->
    <div class="art-box">
      <img id="art" src="" alt="Album Art" />
    </div>

    <!-- Info + Controls -->
    <div class="info-box">
      <div class="track-meta">
        <div class="track-title" id="title">Loading...</div>
        <div class="track-artist" id="artist"></div>
      </div>

      <div class="progress-bar" id="bar">
        <div class="bar-fill" id="bar-fill"></div>
        <div class="bar-scrub" id="bar-scrub" style="left:0%"></div>
      </div>

      <div class="time-row">
        <span id="time-current">0:00</span>
        <span id="time-total">0:00</span>
      </div>

      <div class="controls">
        <button class="btn" id="btn-prev"><i class="fa-solid fa-backward"></i></button>
        <button class="btn primary" id="btn-play"><i class="fa-solid fa-play"></i></button>
        <button class="btn" id="btn-pause"><i class="fa-solid fa-pause"></i></button>
        <button class="btn" id="btn-next"><i class="fa-solid fa-forward"></i></button>
      </div>

      <div class="platform-links">
        <a id="link-spotify" href="#" target="_blank"><i class="fa-brands fa-spotify"></i></a>
        <a id="link-soundcloud" href="#" target="_blank"><i class="fa-brands fa-soundcloud"></i></a>
        <a id="link-youtube" href="#" target="_blank"><i class="fa-brands fa-youtube"></i></a>
      </div>
    </div>

    <!-- Hidden Audio -->
    <audio id="audio" preload="metadata"></audio>
  </div>

  <script src="musicplayer.js"></script>
</body>
</html>

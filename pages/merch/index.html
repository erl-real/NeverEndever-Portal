<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NeverEndEver Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Icons -->
  <link rel="stylesheet" href="https://code.ionicframework.com/ionicons/2.0.1/css/ionicons.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <!-- Fonts -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400..700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=diamond,keyboard_arrow_down,search,shopping_bag&display=block" />

  <!-- Styles -->
  <link rel="stylesheet" href="/styles/sidebarmaintheme.css" />
  <link rel="stylesheet" href="/styles/sidebartheme.css" />
  <link rel="stylesheet" href="/styles/store.css" />
</head>
<body>
  <!-- Toggle Button -->
  <button id="toggleSidebar" class="toggle-btn" aria-label="Toggle sidebar">
    <div class="burger-menu">
      <span class="burger-bun burger-bun--top"></span>
      <span class="burger-bun burger-bun--mid"></span>
      <span class="burger-bun burger-bun--bottom"></span>
    </div>
  </button>

  <!-- Sidebar -->
  <div class="sidebar-wrapper collapsed" id="sidebar">
    <div class="sidebar-inner">
      <aside class="radio-nav" style="--total-radio:24">
        <div class="radio-nav-container">
          <!-- Core Nav Items -->
          <input type="radio" id="nav-home" name="nav-menu" checked />
          <label for="nav-home"><i class="ion-home"></i><a href="/index">Home</a></label>

          <input type="radio" id="nav-products" name="nav-menu" />
          <label for="nav-products"><i class="fa-solid fa-box-open"></i><a href="/pages/products">Products</a></label>

          <input type="radio" id="nav-merch" name="nav-menu" />
          <label for="nav-merch"><i class="fa-solid fa-shirt"></i><a href="/pages/merch">Merch</a></label>

          <input type="radio" id="nav-contact" name="nav-menu" />
          <label for="nav-contact"><i class="ion-email"></i><a href="/pages/contact">Contact</a></label>

          <!-- External / Social -->
          <input type="radio" id="nav-twitch" name="nav-menu" />
          <label for="nav-twitch"><i class="fa-brands fa-twitch"></i><a href="https://twitch.tv/neverendever" target="_blank">Twitch</a></label>

          <input type="radio" id="nav-youtube" name="nav-menu" />
          <label for="nav-youtube"><i class="fa-brands fa-youtube"></i><a href="https://www.youtube.com/@NEVRAMV" target="_blank">YouTube</a></label>

          <input type="radio" id="nav-instagram" name="nav-menu" />
          <label for="nav-instagram"><i class="fa-brands fa-instagram"></i><a href="https://www.instagram.com/endeverrecords/" target="_blank">Instagram</a></label>

          <!-- Glider -->
          <div class="glider-container">
            <div class="glider"></div>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <!-- Top Nav -->
  <nav class="nav">
    <div class="nav-container">
      <div class="nav-wrapper">
        <a href="#" class="logo">
          <span class="md-icon">diamond</span>
        </a>
        <div class="nav-control">
          <form class="search-form">
            <input type="search" placeholder="Search products…" aria-label="Search products" />
            <button type="submit" class="nav-btn"><span class="md-icon">search</span></button>
          </form>
          <button class="nav-btn"><span class="md-icon">shopping_bag</span></button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-content">
      <h1>Holiday Collection</h1>
      <p>Discover gifts for everyone on your list.</p>
      <a href="#products" class="cta-btn">Shop Now</a>
    </div>
  </section>

  <!-- Product Section -->
  <main>
    <section class="product-section" id="products">
      <div class="product-section-container">
        <header class="product-section-header">
          <h2 class="product-section-headline">
            <label for="product-type">
              Find the perfect gift for
              <select class="select" name="palette" id="product-type">
                <option class="option" style="--delay:50ms" value="allPeople" selected>Everyone</option>
                <option class="option" style="--delay:100ms" value="women">Women</option>
                <option class="option" style="--delay:150ms" value="men">Men</option>
                <option class="option" style="--delay:200ms" value="kids">Kids</option>
              </select>
            </label>
          </h2>
        </header>
        <ul class="product-list">
          <li>
            <a href="#" class="product-link-wrapper">
              <div class="product-visual"></div>
              <div class="product-meta">
                <h3 class="product-title">Heritage Canvas Tote</h3>
                <p class="product-price">$39.00 USD</p>
              </div>
            </a>
          </li>
          <!-- repeat product cards -->
        </ul>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-links">
      <a href="/pages/about">About Us</a>
      <a href="/pages/shipping">Shipping & Returns</a>
      <a href="/pages/privacy">Privacy Policy</a>
    </div>
    <form class="newsletter">
      <label for="email">Subscribe for updates</label>
      <input type="email" id="email" placeholder="Your email" />
      <button type="submit">Subscribe</button>
    </form>
  </footer>

  <!-- Scripts -->
  <script src="/scripts/staticsidebar.js" defer></script>
</body>
</html>

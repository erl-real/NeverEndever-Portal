<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Artist Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <h2>🎧 Artist Portal</h2>

  <!-- Auth panel -->
  <div id="auth-panel">
    <form id="email-login-form" onsubmit="event.preventDefault(); emailLogin();">
      <input id="email" type="email" placeholder="Email" required />
      <input id="password" type="password" placeholder="Password" required />
      <button type="submit" class="btn-primary">Log in</button>
      <button type="button" onclick="emailSignup()" class="btn-secondary">Sign up</button>
    </form>
  </div>

  <!-- Session info -->
  <div id="session-panel" style="display:none;">
    <div id="user-email"></div>
    <button type="button" onclick="logout()" class="btn-danger">Log out</button>
  </div>

  <hr>

  <!-- Profile form -->
  <h3>📝 Your Artist Profile</h3>
  <form id="profile-form" onsubmit="event.preventDefault(); saveProfile();" style="display:none;">
    <input id="username" type="text" placeholder="Stage Name" />
    <textarea id="bio" placeholder="Tell us your vibe..." rows="4"></textarea>
    <button type="submit" class="btn-primary">Save Profile</button>
    <div id="status"></div>
    <div id="error"></div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>
<script src="app.js"></script>
</body>
</html>

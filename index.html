<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeverEndEver</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css?family=Lexend:400,600,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />

  <!-- Supabase JS client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <div class="logo">NeverEndEver</div>
    <nav class="nav-bar">
      <!-- existing nav unchanged -->
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="hero-section">
    <div class="hero-content">
      <!-- This logo stays visible after the fire overlay fades -->
<img 
  src="https://imqfnxtornlvglwvkspi.supabase.co/storage/v1/object/public/Never%20Endever%20Branding/med%20logo%203.png" 
  alt="Never EndEver Logo" 
  class="hero-logo"
/>

      <h1 class="hero-title">THE FUTURE OF MUSIC PLATFORMS IS COMING</h1>
      <p class="hero-subtitle">Submit For Music Events, Meet and Collaborate with Other Artist, See Where You Rank In ELO, and Get Help with Your Next Project.</p>
    </div>
  </section>

  <!-- Fire Overlay -->
  <canvas id="fire-overlay"></canvas>

  <!-- Shaders -->
  <script type="x-shader/x-vertex" id="vertShader">
    precision mediump float;
    varying vec2 vUv;
    attribute vec2 a_position;
    void main() {
      vUv = a_position;
      gl_Position = vec4(a_position, 0.0, 1.0);
    }
  </script>

  <script type="x-shader/x-fragment" id="fragShader">
    precision mediump float;
    varying vec2 vUv;
    uniform vec2 u_resolution;
    uniform float u_progress;
    uniform float u_time;
    uniform sampler2D u_text;

    float rand(vec2 n) {
      return fract(cos(dot(n, vec2(12.9898, 4.1414))) * 43758.5453);
    }
    float noise(vec2 n) {
      const vec2 d = vec2(0., 1.);
      vec2 b = floor(n), f = smoothstep(vec2(0.0), vec2(1.0), fract(n));
      return mix(mix(rand(b), rand(b + d.yx), f.x),
                 mix(rand(b + d.xy), rand(b + d.yy), f.x), f.y);
    }
    float fbm(vec2 n) {
      float total = 0.0, amplitude = .4;
      for (int i = 0; i < 4; i++) {
        total += noise(n) * amplitude;
        n += n;
        amplitude *= 0.6;
      }
      return total;
    }
    void main() {
      vec2 uv = vUv;
float aspect = u_resolution.x / u_resolution.y;
uv.x *= aspect;


      vec2 screenUv = vUv * 0.5 + 0.5;
      screenUv.y = 1.0 - screenUv.y;

      float t = u_progress;
      vec4 textColor = texture2D(u_text, screenUv);
      vec3 color = textColor.rgb;

      float main_noise = 1. - fbm(.75 * uv + 10. - vec2(.3, .9 * t));
      float paper_darkness = smoothstep(main_noise - .1, main_noise, t);
      color -= vec3(.99, .95, .99) * paper_darkness;

      vec3 fire_color = fbm(6. * uv - vec2(0., .005 * u_time)) * vec3(6., 1.4, .0);
      float show_fire = smoothstep(.4, .9, fbm(10. * uv + 2. - vec2(0., .005 * u_time)));
      show_fire += smoothstep(.7, .8, fbm(.5 * uv + 5. - vec2(0., .001 * u_time)));

      float fire_border = .02 * show_fire;
      float fire_edge = smoothstep(main_noise - fire_border, main_noise - .5 * fire_border, t);
      fire_edge *= (1. - smoothstep(main_noise - .5 * fire_border, main_noise, t));
      color += fire_color * fire_edge;

      float opacity = 1. - smoothstep(main_noise - .0005, main_noise, t);
      gl_FragColor = vec4(color, opacity);
    }
  </script>

  <!-- Fire overlay JS -->
  <script src="fire.js"></script>

  <!-- Footer -->
  <footer>
    <!-- existing footer unchanged -->
  </footer>
</body>
</html>

  <!-- Emerald Button Styles (kept inline as requested) -->
  <style>
    .emerald-button {
      position: relative;
      z-index: 0;
      display: inline-block;
      font-family: "Montserrat", Helvetica, sans-serif;
      font-size: 15px;
      font-weight: 500;
      padding: 0.75em 1.25em;
      padding-right: 1em;
      background: transparent;
      color: #2e3b8f;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.35);
      text-transform: uppercase;
      letter-spacing: 2.5px;
      text-decoration: none;
      cursor: pointer;
      transition: filter 0.2s ease, transform 0.2s ease;
      filter: brightness(0.95);
      border: none;
    }
    .emerald-button::before {
      content: "";
      position: absolute;
      top: -2px; left: -2px; right: -2px; bottom: -2px;
      background: linear-gradient(90deg, #1a1b4d, #2e3b8f, #4b5edc, #7f6fff, #c259ff, #7f6fff, #4b5edc);
      z-index: -1;
      background-size: 300% 100%;
      transition: background-position 0.8s ease;
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite: exclude;
      -webkit-mask-composite: destination-out;
      padding: 2px;
      box-sizing: border-box;
    }
    .emerald-button:hover::before { background-position: 100% 0; }
    .emerald-button:active { transform: translateY(2px) scale(0.98); filter: brightness(0.85); }
    .emerald-button::after {
      content: "";
      position: absolute; top: 0; bottom: 0; right: 1em;
      display: flex; align-items: center; justify-content: center;
      font-size: 1em; color: #ffffff;
      transition: transform 0.3s ease, color 0.3s ease;
      pointer-events: none;
    }
    .emerald-button:hover::after { animation: bounceright 0.4s alternate ease-in-out infinite; color: #2e3b8f; }
    @keyframes bounceright { from { transform: translateX(0); } to { transform: translateX(4px); } }

    .emerald-heading {
      background: linear-gradient(90deg,#144d32,#1f7a54,#2f9e6f,#53d19b);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 700;
      letter-spacing: 1px;
    }


  </style>

<script>
  const toggleBtn = document.getElementById('menu-toggle');
  const dropdown = document.getElementById('dropdown');

  toggleBtn.addEventListener('click', () => {

  window.addEventListener('click', (e) => {
    if (!toggleBtn.contains(e.target) && !dropdown.contains(e.target)) {
      dropdown.classList.add('hidden');
    }
  });

<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <div class="logo">NeverEndEver</div>
    <nav class="nav-bar">
      <!-- existing nav unchanged -->

  </header>

  <!-- Hero Section -->
  <section class="hero">
    <img 
      src="https://imqfnxtornlvglwvkspi.supabase.co/storage/v1/object/public/Never%20Endever%20Branding/endever%20logo%20home%20header.png" 
      alt="Never EndEver Logo" 
      class="hero-logo"
    />
    <h1>THE FUTURE OF MUSIC PLATFORMS IS COMING</h1>
    <p>Submit for music events, meet and collaborate with other artists, see where you rank in ELO, and get help with your next project.</p>
    <button class="cta" onclick="window.location.href='login.html'">Join Now</button>

    <!-- New test button -->
    <button id="testFunctionBtn" class="cta" style="margin-top:20px;">Test Supabase Function</button>
    <div id="functionResult" style="margin-top:15px; color:#b16eff; font-weight:bold;"></div>
  </section>

    <!-- existing cards unchanged -->

  <!-- Footer -->
  <footer>
    <!-- existing footer unchanged -->
  </footer>

  <!-- Scripts -->
  <script>
    async function callSupabaseFunction() {
      const resultDiv = document.getElementById("functionResult");
      resultDiv.textContent = "Calling function...";

      try {
        const response = await fetch(
          "https://imqfnxtornlvglwvkspi.functions.supabase.co/basic-core-001",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." // your anon key
            },
            body: JSON.stringify({ name: "Real" })
          }
        );

        const data = await response.json();
        resultDiv.textContent = data.message;
      } catch (error) {
        console.error(error);
        resultDiv.textContent = "Error calling function.";
      }
    }

    document.getElementById("testFunctionBtn").addEventListener("click", callSupabaseFunction);
  </script>
</body>

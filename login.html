<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | NeverEndEver</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header class="site-header">
    <div class="logo">NeverEndEver</div>
    <nav class="nav-bar">
      <ul>
        <li><a href="index.html">Home</a></li>
      </ul>
    </nav>
  </header>

  <section class="auth">
    <h1>Login</h1>
    <form id="login-form" autocomplete="on">
      <div class="form-group">
        <input type="email" id="login-email" placeholder="Email" autocomplete="email" required>
      </div>
      <div class="form-group password-group">
        <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" required>
        <button type="button" id="toggle-password" aria-label="Show password">👁</button>
      </div>
      <button type="submit" id="login-btn">Login</button>
      <div id="login-status" class="status-message"></div>
    </form>

    <div class="oauth-options">
      <p>Coming soon:</p>
      <button disabled class="oauth-btn">Google</button>
      <button disabled class="oauth-btn">Discord</button>
      <button disabled class="oauth-btn">GitHub</button>
    </div>

    <p>Don’t have an account? <a href="signup.html">Sign up here</a></p>
  </section>

  <footer>
    <small>© 2025 NeverEndEver</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Initialize Supabase client
    const supabaseClient = supabase.createClient(
      "https://YOUR_PROJECT.supabase.co",
      "YOUR_ANON_KEY"
    );

    // Toggle password visibility
    document.getElementById("toggle-password").addEventListener("click", () => {
      const pwField = document.getElementById("login-password");
      pwField.type = pwField.type === "password" ? "text" : "password";
    });

    // Handle login
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("login-btn");
      const status = document.getElementById("login-status");
      btn.disabled = true;
      btn.textContent = "Logging in…";
      status.textContent = "";

      const email = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value;

      // Basic client-side validation
      if (!email.includes("@")) {
        status.textContent = "Please enter a valid email address.";
        btn.disabled = false;
        btn.textContent = "Login";
        return;
      }

      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

      if (error) {
        status.textContent = error.message;
        btn.disabled = false;
        btn.textContent = "Login";
      } else {
        status.textContent = "Success! Redirecting…";
        window.location.href = "dashboard.html";
      }
    });
  </script>
</body>
</html>

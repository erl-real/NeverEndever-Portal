<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | NeverEndEver</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header class="site-header">
    <!-- Logo with SVG (from attached layout) -->
    <div class="logo">
      <a href="index.html">
        <svg width="93" height="38" viewBox="0 0 93 38" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="45" cy="17" r="10" stroke="#776EF6" stroke-width="4"/>
          <circle cx="45" cy="17" r="2" fill="#776EF6"/>
          <path d="M76.0809 8.27901L84.1939 21.9707C85.3788 23.9705 83.9374 26.5 81.6129 26.5H65.3871C63.0626 26.5 61.6212 23.9705 62.8062 21.9707L70.9191 8.279C72.081 6.31809 74.919 6.31809 76.0809 8.27901Z" stroke="#776EF6" stroke-width="4"/>
          <rect x="4" y="5" width="24" height="4" rx="2" fill="#776EF6"/>
          <rect x="4" y="25" width="24" height="4" rx="2" fill="#776EF6"/>
          <path d="M6.00001 6.99947L5.99999 11.8609C5.99998 14.4773 8.01701 16.6513 10.626 16.8469L21.3739 17.653C23.9829 17.8487 25.9999 20.0227 25.9999 22.639L25.9999 26.9991" stroke="#776EF6" stroke-width="4"/>
        </svg>
      </a>
    </div>
    <nav class="nav-bar">
      <ul>
        <li><a href="index.html">Home</a></li>
      </ul>
    </nav>
  </header>

  <section class="auth">
    <h1>Account Login</h1>
    <form id="login-form" autocomplete="on">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="Email" autocomplete="email" required>
      </div>
      <div class="form-group password-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" required>
        <button type="button" id="toggle-password" aria-label="Show password">👁</button>
      </div>
      <div class="form-group">
        <input type="checkbox" id="remember-me">
        <label for="remember-me">Remember Me</label>
        <a href="#" class="forgot-link">Forgot Password?</a>
      </div>
      <button type="submit" id="login-btn">Log In</button>
      <div id="login-status" class="status-message"></div>
    </form>

    <div class="auth-links">
      <p>Don’t have an account? <a href="signup.html">Register</a></p>
    </div>
  </section>

  <footer>
    <small>© 2025 NeverEndEver</small>
  </footer>

<!-- Supabase library -->
<script type="module" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- Your app logic -->
<script type="module" src="script.js"></script>

</body>
</html>

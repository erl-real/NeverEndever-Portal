<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | NeverEndEver</title>
  <link rel="stylesheet" href="login.css"/>
</head>
<body class="auth-page login">
  <header class="site-header">
<div class="bg">


  </header>

<div class="box">
    <div class="logo">
      <a href="index.html" aria-label="NeverEndEver home">
        <img 
          src="https://imqfnxtornlvglwvkspi.supabase.co/storage/v1/object/public/Never%20Endever%20Branding/med%20logo%201.png" 
          alt="NeverEndEver logo" 
          width="93" 
          height="93">
      </a>
    <nav class="nav-bar">
      <ul>
<a href="index.html">Home</a>
      </ul>
    </nav>
</div>
  <section class="auth">
    <h1>Account Login</h1>
    <form id="login-form" autocomplete="on">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input class="inp" type="email" id="login-email" placeholder="Email" autocomplete="email" required>
      </div>
      <div class="form-group password-group">
        <label for="login-password">Password</label>
        <input class="inp" type="password" id="login-password" placeholder="Password" autocomplete="current-password" required>
        <button type="button" id="toggle-password" aria-label="Show password">👁</button>
      </div>
      <div class="form-group">
        <input type="checkbox" id="remember-me">
        <label for="remember-me">Remember Me</label>
        <a href="#" class="forgot-link">Forgot Password?</a>
      </div>
      <button class="btn" type="submit" id="login-btn">Log In</button>
      <div id="login-status" class="status-message"></div>
    </form>

    <div class="auth-links">
      <p>Don’t have an account? <a href="signup.html">Register</a></p>
    </div>
  </section>

  <footer>
    <small>© 2025 NeverEndEver</small>
  </footer>

  <!-- Load Supabase library -->
  <script type="module" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Load your app logic -->
  <script type="module" src="script.js"></script>
</body>
</html>

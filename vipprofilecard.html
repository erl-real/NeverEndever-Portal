<link rel="stylesheet" href="vipprofilecard.css">
<div class="minimap">
      <div class="minimap__stats">
        <span>x: 0</span>
        <span>y: 0</span>
      </div>
    </div>
          <article class="card" data-active="false">
        <button aria-label="Flip card" aria-pressed="false"></button>
        <div class="card__content">
          <div class="card__rear card__face">
            <img
              class="backdrop"
              src=""
              alt
            />
            <div class="card__emboss">
              <div class="wordmark">
                <img
                  src="smalllogo.png"
                  alt=""
                />
              </div>
              <div class="wordmark">
                <img
                  src=""
                  alt=""
                />
              </div>
              <img
                class="gemstone"
                src=""
                alt
              />
            </div>
            <div class="spotlight"></div>
          </div>
          <div class="card__front">
            <div class="img">
              <img
                src="realcard.png"
                alt=""
              />
            </div>
            <!-- when you're working with these layers, you need to think differently -->
            <!-- blended layers -->
            <!-- don't worry about this block, it's just a debugging layer to break it down -->
            <div class="debug">
              <div class="refraction refraction--debug"></div>
              <div class="refraction refraction--debug"></div>
            </div>
            <div class="debug debug--clipped">
              <div class="refraction refraction--debug"></div>
              <div class="refraction refraction--debug"></div>
            </div>

            <!-- perhaps this is a holographic texture that acts as a mask -->
            <!-- then you show a nice color gradient through it but then mask it as a whole dynamically -->
            <div class="pattern">
              <div class="refraction"></div>
              <div class="refraction"></div>
            </div>
            <!-- perhaps then you want to do some kind of watermark or something different -->
            <!-- do the same thing again but tweak the opacity strength etc. -->
            <!-- or you can merge the masks but you don't have to overcomplicate it, just play with it -->
            <div class="watermark">
              <div class="refraction"></div>
              <div class="refraction"></div>
            </div>
            <!-- outline image -->
            <!-- this is a repeat of the background-image that sits on top with the background cut out -->
            <!-- perhaps your spotlight sits above this but the main point is that it doesn't get holographic -->
            <div class="card__frame card__emboss">
              <h3>
                <span>RealisRareofNC</span><br /><span
                  >CMO @ Endever</span
                >
              </h3>
            
              <div class="sticker">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  xmlns="smalllogo.png"
                >
              
              </div>
              <img
                src="realcard.png"
                alt=""
              />
            </div>
            <!-- then you'll want some kind of lighting system perhaps, a spotlight -->
            <!-- this is typically going to be a light to dark radial gradient with adjusted opacity -->
            <!-- this one in particular relies on mix-blend-mode to give the right effect -->
            <div class="spotlight"></div>
            <div class="glare-container">
              <div class="glare"></div>
            </div>
          </div>
        </div>
      </article>
    </div>
    <!-- SVG Filters for text outline + lighting emboss -->
    <svg class="sr-only" xmlns="smalllogo.png">
      <defs>
        <filter id="lighting">
          <feGaussianBlur
            in="SourceAlpha"
            stdDeviation="2"
            result="blur"
          ></feGaussianBlur>
          <feSpecularLighting
            result="lighting"
            in="blur"
            surfaceScale="8"
            specularConstant="12"
            specularExponent="120"
            lighting-color="hsl(0 0% 6%)"
          >
            <fePointLight x="50" y="50" z="300"></fePointLight>
          </feSpecularLighting>
          <feComposite
            in="lighting"
            in2="SourceAlpha"
            operator="in"
            result="composite"
          ></feComposite>
          <feComposite
            in="SourceGraphic"
            in2="composite"
            operator="arithmetic"
            k1="0"
            k2="1"
            k3="1"
            k4="0"
            result="litPaint"
          ></feComposite>
        </filter>
        <filter id="sticker">
          <feMorphology
            in="SourceAlpha"
            result="dilate"
            operator="dilate"
            radius="2"
          ></feMorphology>
          <feFlood flood-color="hsl(0 0% 100%)" result="outlinecolor"></feFlood>
          <feComposite
            in="outlinecolor"
            in2="dilate"
            operator="in"
            result="outlineflat"
          ></feComposite>
          <feMerge result="merged">
            <feMergeNode in="outlineflat"></feMergeNode>
            <feMergeNode in="SourceGraphic"></feMergeNode>
          </feMerge>
        </filter>
      </defs>
    </svg>
    <script type="module" src="vipprofilecard.js"></script>
    </a>
